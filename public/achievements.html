<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements - AI Battle Arena</title>
    <link rel="stylesheet" href="styles.css">
    <script src="achievements.js"></script>
    <style>
        .achievements-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            color: #00ffff;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-size: 32px;
            font-weight: bold;
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .achievement-card {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid #555;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            gap: 15px;
            transition: all 0.3s;
        }

        .achievement-card.unlocked {
            border-color: gold;
            background: rgba(255, 215, 0, 0.1);
        }

        .achievement-card.locked {
            opacity: 0.5;
        }

        .achievement-icon-large {
            font-size: 48px;
            flex-shrink: 0;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .achievement-card.unlocked .achievement-name {
            color: gold;
        }

        .achievement-description {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .achievement-status {
            color: #00ff00;
            font-weight: bold;
            font-size: 12px;
        }

        .achievement-card.locked .achievement-status {
            color: #888;
        }

        .completion-stats {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid #ff00ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .completion-bar {
            width: 100%;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            margin: 10px 0;
        }

        .completion-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            transition: width 1s ease;
        }

        .reset-btn {
            padding: 10px 20px;
            background: #ff0000;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <div class="achievements-container">
        <header class="arena-header">
            <h1 class="title">
                <span class="title-icon">🏅</span>
                ACHIEVEMENTS
                <span class="title-icon">🏅</span>
            </h1>
            <a href="index.html" style="display: block; text-align: center; color: #888; margin-top: 10px;">← Back to Arena</a>
        </header>

        <div class="completion-stats">
            <h2 style="color: #00ffff;">Overall Progress</h2>
            <div id="completionText" style="color: #fff; font-size: 24px; margin: 10px 0;">
                0 / 15 Unlocked (0%)
            </div>
            <div class="completion-bar">
                <div id="completionFill" class="completion-fill" style="width: 0%;"></div>
            </div>
        </div>

        <div class="stats-overview" id="statsOverview"></div>

        <div class="achievements-grid" id="achievementsGrid"></div>

        <div style="text-align: center;">
            <button class="reset-btn" onclick="window.achievementSystem.reset(); location.reload();">
                Reset All Achievements
            </button>
        </div>
    </div>

    <script>
        function renderAchievements() {
            const progress = window.achievementSystem.getProgress();
            const achievements = progress.achievements;
            const stats = progress.stats;

            // Render stats overview
            const statsHTML = `
                <div class="stat-box">
                    <div class="stat-label">Battles</div>
                    <div class="stat-value">${stats.battlesPlayed}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Wins</div>
                    <div class="stat-value" style="color: #00ff00;">${stats.wins}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Losses</div>
                    <div class="stat-value" style="color: #ff0000;">${stats.losses}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Win Streak</div>
                    <div class="stat-value" style="color: #ffaa00;">${stats.longestStreak}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Max Damage</div>
                    <div class="stat-value" style="color: #ff00ff;">${stats.maxDamageInBattle}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Critical Hits</div>
                    <div class="stat-value" style="color: #ffff00;">${stats.criticalHits}</div>
                </div>
            `;
            document.getElementById('statsOverview').innerHTML = statsHTML;

            // Render achievements
            const achievementsHTML = achievements.map(ach => `
                <div class="achievement-card ${ach.unlocked ? 'unlocked' : 'locked'}">
                    <div class="achievement-icon-large">${ach.icon}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${ach.name}</div>
                        <div class="achievement-description">${ach.description}</div>
                        <div class="achievement-status">
                            ${ach.unlocked ? '✅ UNLOCKED' : '🔒 Locked'}
                        </div>
                    </div>
                </div>
            `).join('');
            document.getElementById('achievementsGrid').innerHTML = achievementsHTML;

            // Update completion
            const unlocked = achievements.filter(a => a.unlocked).length;
            const total = achievements.length;
            const percentage = Math.round((unlocked / total) * 100);

            document.getElementById('completionText').textContent = 
                `${unlocked} / ${total} Unlocked (${percentage}%)`;
            document.getElementById('completionFill').style.width = `${percentage}%`;
        }

        renderAchievements();
    </script>
<script src="navigation.js"></script>
</body>
</html>
