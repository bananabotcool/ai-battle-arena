<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - AI Battle Arena</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .leaderboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .sort-controls {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .sort-btn {
            padding: 10px 20px;
            border: 2px solid #00ffff;
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sort-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .sort-btn.active {
            background: #00ffff;
            color: #000;
        }

        .leaderboard-table {
            background: rgba(20, 20, 30, 0.9);
            border: 2px solid #ff00ff;
            border-radius: 10px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #ff00ff, #00ffff);
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: bold;
            color: #000;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 12px 15px;
            color: #fff;
        }

        .rank {
            font-size: 24px;
            font-weight: bold;
            width: 60px;
        }

        .rank.gold { color: gold; }
        .rank.silver { color: silver; }
        .rank.bronze { color: #CD7F32; }

        .agent-name {
            font-weight: bold;
            color: #00ffff;
        }

        .stat-good {
            color: #00ff00;
            font-weight: bold;
        }

        .stat-bad {
            color: #ff0000;
        }

        .win-rate {
            font-size: 18px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00ffff;
            font-size: 24px;
        }
    </style>
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <div class="leaderboard-container">
        <header class="arena-header">
            <h1 class="title">
                <span class="title-icon">🏆</span>
                LEADERBOARD
                <span class="title-icon">🏆</span>
            </h1>
            <p style="text-align: center; color: #00ffff; margin-top: 10px;">
                Hall of Champions
            </p>
        </header>

        <div class="sort-controls">
            <button class="sort-btn active" data-sort="rating">📊 Sort by Rating</button>
            <button class="sort-btn" data-sort="winRate">🎯 Sort by Win Rate</button>
            <button class="sort-btn" data-sort="wins">🏆 Sort by Wins</button>
            <button class="sort-btn" data-sort="battles">⚔️ Sort by Battles</button>
            <button class="sort-btn" style="margin-left: auto; border-color: #ff0000; color: #ff0000;" 
                    onclick="if(confirm('Reset leaderboard?')) resetLeaderboard()">
                🗑️ Reset
            </button>
            <a href="index.html" class="sort-btn" style="border-color: #888; color: #888; text-decoration: none;">← Back</a>
        </div>

        <div id="leaderboardContent" class="loading">
            Loading leaderboard...
        </div>
    </div>

    <script>
        let currentSort = 'rating';

        async function loadLeaderboard(sortBy = 'rating') {
            currentSort = sortBy;
            
            // Update active button
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.sort === sortBy) {
                    btn.classList.add('active');
                }
            });

            try {
                const response = await fetch(`/api/leaderboard?sortBy=${sortBy}&limit=20`);
                const data = await response.json();
                
                renderLeaderboard(data.leaderboard);
            } catch (error) {
                console.error('Error loading leaderboard:', error);
                document.getElementById('leaderboardContent').innerHTML = 
                    '<div class="loading" style="color: #ff0000;">❌ Failed to load leaderboard</div>';
            }
        }

        function renderLeaderboard(agents) {
            if (!agents || agents.length === 0) {
                document.getElementById('leaderboardContent').innerHTML = `
                    <div class="loading">
                        No battles recorded yet. Start battling to build the leaderboard!
                        <br><br>
                        <a href="index.html" class="sort-btn" style="display: inline-block; text-decoration: none;">
                            Start Battling →
                        </a>
                    </div>
                `;
                return;
            }

            const html = `
                <div class="leaderboard-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Agent</th>
                                <th>Rating</th>
                                <th>Win Rate</th>
                                <th>Wins</th>
                                <th>Losses</th>
                                <th>Battles</th>
                                <th>Streak</th>
                                <th>Damage Dealt</th>
                                <th>Crits</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${agents.map(agent => `
                                <tr>
                                    <td class="rank ${getRankClass(agent.rank)}">#${agent.rank}</td>
                                    <td>
                                        <div class="agent-name">${agent.name}</div>
                                        <div style="font-size: 12px; color: #888;">${agent.personality}</div>
                                    </td>
                                    <td class="stat-good">${agent.rating}</td>
                                    <td class="win-rate ${agent.winRate >= 50 ? 'stat-good' : 'stat-bad'}">
                                        ${agent.winRate}%
                                    </td>
                                    <td class="stat-good">${agent.wins}</td>
                                    <td class="stat-bad">${agent.losses}</td>
                                    <td>${agent.battlesPlayed}</td>
                                    <td>${agent.longestWinStreak || 0}</td>
                                    <td>${agent.totalDamageDealt || 0}</td>
                                    <td>${agent.criticalHits || 0}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            document.getElementById('leaderboardContent').innerHTML = html;
        }

        function getRankClass(rank) {
            if (rank === 1) return 'gold';
            if (rank === 2) return 'silver';
            if (rank === 3) return 'bronze';
            return '';
        }

        async function resetLeaderboard() {
            try {
                await fetch('/api/leaderboard/reset', { method: 'POST' });
                loadLeaderboard(currentSort);
            } catch (error) {
                console.error('Error resetting leaderboard:', error);
            }
        }

        // Event listeners
        document.querySelectorAll('.sort-btn[data-sort]').forEach(btn => {
            btn.addEventListener('click', () => loadLeaderboard(btn.dataset.sort));
        });

        // Load on page load
        loadLeaderboard();
    </script>
<script src="navigation.js"></script>
</body>
</html>
