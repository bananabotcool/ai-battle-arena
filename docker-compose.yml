version: '3.8'

services:
  arena:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-battle-arena
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3001
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/agents"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - arena-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  arena-network:
    driver: bridge

volumes:
  data:
  logs:
